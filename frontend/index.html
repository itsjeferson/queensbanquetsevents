<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Queen's Banquet Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var path = location.pathname;
        var search = location.search || '';

        function go(hashPath) {
          location.replace(location.origin + hashPath + search);
        }

        var shareCodeMatch = path.match(/^\/share\/by-code\/([^/]+)\/?$/);
        if (shareCodeMatch) {
          go('/#/i/' + decodeURIComponent(shareCodeMatch[1]));
          return;
        }

        var shareSlugMatch = path.match(/^\/share\/([^/]+)\/?$/);
        if (shareSlugMatch) {
          go('/#/invite/' + decodeURIComponent(shareSlugMatch[1]));
          return;
        }

        var inviteMatch = path.match(/^\/(?:invite|invitation)\/([^/]+)\/?$/);
        if (inviteMatch) {
          go('/#/invite/' + decodeURIComponent(inviteMatch[1]));
          return;
        }

        var codeMatch = path.match(/^\/i\/([^/]+)\/?$/);
        if (codeMatch) {
          go('/#/i/' + decodeURIComponent(codeMatch[1]));
          return;
        }

        if (location.hash && location.hash.length > 2) return;

        var params = new URLSearchParams(location.search);
        var open = params.get('open');
        var code = params.get('code');

        if (open) {
          params.delete('open');
          var tail = params.toString();
          location.replace(
            location.origin + '/#/invite/' + encodeURIComponent(open) + (tail ? '?' + tail : ''),
          );
          return;
        }

        if (code) {
          params.delete('code');
          var codeTail = params.toString();
          location.replace(
            location.origin + '/#/i/' + encodeURIComponent(code) + (codeTail ? '?' + codeTail : ''),
          );
        }
      })();
    </script>
    <script type="module" src="/src/app/main.jsx"></script>
  </body>
</html>
