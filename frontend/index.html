<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Queen's Banquet Events</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        if (location.hash && location.hash.length > 2) return;

        var params = new URLSearchParams(location.search);
        var open = params.get('open');
        var code = params.get('code');

        if (open) {
          params.delete('open');
          var tail = params.toString();
          location.replace(
            location.origin + '/#/invite/' + encodeURIComponent(open) + (tail ? '?' + tail : ''),
          );
          return;
        }

        if (code) {
          params.delete('code');
          var codeTail = params.toString();
          location.replace(
            location.origin + '/#/i/' + encodeURIComponent(code) + (codeTail ? '?' + codeTail : ''),
          );
          return;
        }

        var path = location.pathname;
        var inviteMatch = path.match(/^\/(?:invite|invitation)\/([^/]+)\/?$/);
        var codeMatch = path.match(/^\/i\/([^/]+)\/?$/);
        var segment = inviteMatch ? inviteMatch[1] : codeMatch ? codeMatch[1] : null;
        if (!segment) return;

        var hashPath = codeMatch
          ? '/#/i/' + decodeURIComponent(segment)
          : '/#/invite/' + decodeURIComponent(segment);
        location.replace(location.origin + hashPath + location.search);
      })();
    </script>
    <script type="module" src="/src/app/main.jsx"></script>
  </body>
</html>
