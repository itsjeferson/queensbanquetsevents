# Render Blueprint — Queen's Banquet API + PostgreSQL
# Deploy: Render Dashboard → New → Blueprint → connect this repo

# IMPORTANT: the web service and database MUST share the same region,
# otherwise the internal DATABASE_URL hostname will not resolve.
databases:
  - name: queens-banquet-db
    plan: free
    region: oregon
    databaseName: queens_banquet
    user: queens_banquet

services:
  - type: web
    name: queens-banquet-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
